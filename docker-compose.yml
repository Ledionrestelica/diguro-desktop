name: diguro-dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: diguro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: diguro
      POSTGRES_PASSWORD: diguro
      POSTGRES_DB: diguro
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U diguro -d diguro']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: diguro-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: diguro-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    command: server /data --console-address ':9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 3s
      retries: 5

  # Creates the dev bucket on startup and exits
  minio-init:
    image: minio/mc:latest
    container_name: diguro-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/diguro &&
      mc anonymous set download local/diguro;
      "

  inngest:
    image: inngest/inngest:latest
    container_name: diguro-inngest
    restart: unless-stopped
    ports:
      - '8288:8288'
    command: ['start', '--sdk-url', 'http://host.docker.internal:3000/api/inngest']
    extra_hosts:
      - 'host.docker.internal:host-gateway'

volumes:
  pgdata:
  redisdata:
  miniodata:
