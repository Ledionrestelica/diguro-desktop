# electron-builder configuration. Used by `pnpm package` and the
# release.yml CI workflow to produce signed-or-unsigned installers
# for macOS, Windows, and Linux.

appId: se.diguro.desktop
productName: Diguro
copyright: Copyright © Diguro

directories:
  output: release/${version}
  buildResources: build

files:
  - dist
  - dist-electron
  - package.json

# Publish target — electron-builder's `--publish always` flag uses this
# to upload each platform's artifacts to the matching GitHub release.
# The release tag must match `v${version}` from package.json (the CI
# workflow handles the tag → release mapping).
publish:
  provider: github
  owner: Ledionrestelica
  repo: diguro-desktop
  releaseType: release

# ─── macOS ────────────────────────────────────────────────────────────
# DMG installer for both Intel + Apple Silicon.
#
# `identity: null` is REQUIRED for unsigned builds — without it
# electron-builder searches for a default keychain identity, falls back
# to ad-hoc signing of the cwd, and fails with 'not a file'. Once you
# have an Apple Developer cert (.p12 + CSC_LINK env), remove this line
# and electron-builder will sign + notarize automatically.
#
# `hardenedRuntime: false` because hardened runtime requires real
# signing (it's a notarization prerequisite). Re-enable when signing.
mac:
  identity: null
  hardenedRuntime: false
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64

# Default DMG layout — electron-builder picks sensible defaults
# (the .app on the left, /Applications shortcut on the right).
# Override here only when you have brand-specific artwork.
dmg:
  writeUpdateInfo: true

# ─── Windows ──────────────────────────────────────────────────────────
# NSIS installer (.exe). Single-file MSI is also possible — leaving it as
# NSIS for now since it's the de-facto Electron default and supports the
# auto-updater out of the box.
win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

# ─── Linux ────────────────────────────────────────────────────────────
linux:
  category: Office
  target:
    - target: AppImage
      arch:
        - x64
